<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C75B2A" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#F5F1EB"/>
      <stop offset="100%" stop-color="#805ad5" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <!-- Abstract community circle motif - people in a circle -->
  <!-- Central gathering circle -->
  <circle cx="600" cy="200" r="120" stroke="#C75B2A" stroke-width="3" fill="none" opacity="0.3"/>
  <circle cx="600" cy="200" r="80" stroke="#8B7E74" stroke-width="2" fill="none" opacity="0.2"/>
  <!-- People circles arranged around center -->
  <circle cx="600" cy="80" r="25" fill="#e53e3e" opacity="0.7"/>
  <circle cx="704" cy="120" r="25" fill="#dd6b20" opacity="0.7"/>
  <circle cx="720" cy="220" r="25" fill="#d69e2e" opacity="0.7"/>
  <circle cx="660" cy="310" r="25" fill="#38a169" opacity="0.7"/>
  <circle cx="540" cy="310" r="25" fill="#3182ce" opacity="0.7"/>
  <circle cx="480" cy="220" r="25" fill="#319795" opacity="0.7"/>
  <circle cx="496" cy="120" r="25" fill="#805ad5" opacity="0.7"/>
  <!-- Person icons (simple head circles) -->
  <circle cx="600" cy="74" r="8" fill="white" opacity="0.9"/>
  <circle cx="704" cy="114" r="8" fill="white" opacity="0.9"/>
  <circle cx="720" cy="214" r="8" fill="white" opacity="0.9"/>
  <circle cx="660" cy="304" r="8" fill="white" opacity="0.9"/>
  <circle cx="540" cy="304" r="8" fill="white" opacity="0.9"/>
  <circle cx="480" cy="214" r="8" fill="white" opacity="0.9"/>
  <circle cx="496" cy="114" r="8" fill="white" opacity="0.9"/>
  <!-- Connecting lines -->
  <g stroke="#8B7E74" stroke-width="1" opacity="0.2">
    <line x1="600" y1="105" x2="679" y2="120"/>
    <line x1="704" y1="145" x2="720" y2="195"/>
    <line x1="720" y1="245" x2="660" y2="285"/>
    <line x1="660" y1="310" x2="540" y2="310"/>
    <line x1="540" y1="285" x2="480" y2="245"/>
    <line x1="480" y1="195" x2="496" y2="145"/>
    <line x1="496" y1="120" x2="575" y2="95"/>
  </g>
  <!-- Decorative smaller circles -->
  <circle cx="200" cy="100" r="40" fill="#C75B2A" opacity="0.08"/>
  <circle cx="1000" cy="300" r="50" fill="#805ad5" opacity="0.08"/>
  <circle cx="150" cy="300" r="30" fill="#38a169" opacity="0.08"/>
  <circle cx="1050" cy="100" r="35" fill="#3182ce" opacity="0.08"/>
</svg>
