<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="mapBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#805ad5" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#F5F1EB"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#mapBg)"/>
  <!-- Abstract neighborhood grid pattern -->
  <g stroke="#8B7E74" stroke-width="1" opacity="0.15">
    <!-- Horizontal roads -->
    <line x1="100" y1="100" x2="1100" y2="100"/>
    <line x1="80" y1="200" x2="1120" y2="200"/>
    <line x1="100" y1="300" x2="1100" y2="300"/>
    <!-- Vertical roads -->
    <line x1="200" y1="50" x2="200" y2="350"/>
    <line x1="400" y1="50" x2="400" y2="350"/>
    <line x1="600" y1="50" x2="600" y2="350"/>
    <line x1="800" y1="50" x2="800" y2="350"/>
    <line x1="1000" y1="50" x2="1000" y2="350"/>
  </g>
  <!-- Neighborhood blocks with theme colors -->
  <rect x="220" y="110" width="160" height="80" rx="8" fill="#e53e3e" opacity="0.15"/>
  <rect x="420" y="110" width="160" height="80" rx="8" fill="#dd6b20" opacity="0.15"/>
  <rect x="620" y="110" width="160" height="80" rx="8" fill="#d69e2e" opacity="0.15"/>
  <rect x="820" y="110" width="160" height="80" rx="8" fill="#38a169" opacity="0.15"/>
  <rect x="220" y="210" width="160" height="80" rx="8" fill="#3182ce" opacity="0.15"/>
  <rect x="420" y="210" width="160" height="80" rx="8" fill="#319795" opacity="0.15"/>
  <rect x="620" y="210" width="160" height="80" rx="8" fill="#805ad5" opacity="0.15"/>
  <rect x="820" y="210" width="160" height="80" rx="8" fill="#C75B2A" opacity="0.15"/>
  <!-- Location pins as circles -->
  <circle cx="300" cy="150" r="12" fill="#e53e3e" opacity="0.6"/>
  <circle cx="300" cy="150" r="5" fill="white"/>
  <circle cx="500" cy="150" r="12" fill="#dd6b20" opacity="0.6"/>
  <circle cx="500" cy="150" r="5" fill="white"/>
  <circle cx="700" cy="250" r="12" fill="#805ad5" opacity="0.6"/>
  <circle cx="700" cy="250" r="5" fill="white"/>
  <circle cx="900" cy="250" r="12" fill="#C75B2A" opacity="0.6"/>
  <circle cx="900" cy="250" r="5" fill="white"/>
  <!-- Houston shape outline (simplified) -->
  <path d="M550 60 Q600 40 650 60 L680 80 Q700 100 690 130 L670 160 Q650 180 620 180 L580 180 Q550 180 530 160 L510 130 Q500 100 520 80 Z" stroke="#805ad5" stroke-width="2" fill="#805ad5" opacity="0.08"/>
</svg>
