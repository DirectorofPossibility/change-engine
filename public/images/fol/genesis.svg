  <!-- Subtle inner petals emerging -->
  <circle cx="200" cy="160" r="40" stroke="#C75B2A" stroke-width="1.5" opacity="0.25"/>
  <circle cx="200" cy="240" r="40" stroke="#C75B2A" stroke-width="1.5" opacity="0.25"/>
  <circle cx="234.6" cy="180" r="40" stroke="#C75B2A" stroke-width="1.5" opacity="0.25"/>
  <circle cx="234.6" cy="220" r="40" stroke="#C75B2A" stroke-width="1.5" opacity="0.25"/>
  <circle cx="165.4" cy="180" r="40" stroke="#C75B2A" stroke-width="1.5" opacity="0.25"/>
  <circle cx="165.4" cy="220" r="40" stroke="#C75B2A" stroke-width="1.5" opacity="0.25"/>
