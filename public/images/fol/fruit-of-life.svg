<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <!-- Fruit of Life — 13 circles, the feminine pattern within the Flower -->
  <circle cx="200" cy="200" r="185" stroke="#C75B2A" stroke-width="0.8" opacity="0.08"/>

  <!-- Center -->
  <circle cx="200" cy="200" r="28" stroke="#C75B2A" stroke-width="2.5" opacity="0.8"/>

  <!-- Inner ring of 6 -->
  <circle cx="200" cy="144" r="28" stroke="#C75B2A" stroke-width="2" opacity="0.6"/>
  <circle cx="248.5" cy="172" r="28" stroke="#C75B2A" stroke-width="2" opacity="0.6"/>
  <circle cx="248.5" cy="228" r="28" stroke="#C75B2A" stroke-width="2" opacity="0.6"/>
  <circle cx="200" cy="256" r="28" stroke="#C75B2A" stroke-width="2" opacity="0.6"/>
  <circle cx="151.5" cy="228" r="28" stroke="#C75B2A" stroke-width="2" opacity="0.6"/>
  <circle cx="151.5" cy="172" r="28" stroke="#C75B2A" stroke-width="2" opacity="0.6"/>

  <!-- Outer ring of 6 -->
  <circle cx="200" cy="88" r="28" stroke="#C75B2A" stroke-width="1.5" opacity="0.35"/>
  <circle cx="297" cy="144" r="28" stroke="#C75B2A" stroke-width="1.5" opacity="0.35"/>
  <circle cx="297" cy="256" r="28" stroke="#C75B2A" stroke-width="1.5" opacity="0.35"/>
  <circle cx="200" cy="312" r="28" stroke="#C75B2A" stroke-width="1.5" opacity="0.35"/>
  <circle cx="103" cy="256" r="28" stroke="#C75B2A" stroke-width="1.5" opacity="0.35"/>
  <circle cx="103" cy="144" r="28" stroke="#C75B2A" stroke-width="1.5" opacity="0.35"/>

  <circle cx="200" cy="200" r="4" fill="#C75B2A" opacity="0.5"/>
</svg>
