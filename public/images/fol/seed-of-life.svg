<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <!-- Seed of Life — 7 overlapping circles, delicate and luminous -->
  <circle cx="200" cy="200" r="175" stroke="#C75B2A" stroke-width="1" opacity="0.08"/>

  <!-- Six outer petals -->
  <circle cx="200" cy="140" r="60" stroke="#C75B2A" stroke-width="2" opacity="0.5"/>
  <circle cx="252" cy="170" r="60" stroke="#C75B2A" stroke-width="2" opacity="0.5"/>
  <circle cx="252" cy="230" r="60" stroke="#C75B2A" stroke-width="2" opacity="0.5"/>
  <circle cx="200" cy="260" r="60" stroke="#C75B2A" stroke-width="2" opacity="0.5"/>
  <circle cx="148" cy="230" r="60" stroke="#C75B2A" stroke-width="2" opacity="0.5"/>
  <circle cx="148" cy="170" r="60" stroke="#C75B2A" stroke-width="2" opacity="0.5"/>

  <!-- Center — bold -->
  <circle cx="200" cy="200" r="60" stroke="#C75B2A" stroke-width="2.5" opacity="0.8"/>
  <circle cx="200" cy="200" r="4" fill="#C75B2A" opacity="0.6"/>
</svg>
