<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <!-- Metatron's Cube — circles + connecting lines revealing hidden structure -->

  <!-- Connecting lines first (behind circles) -->
  <line x1="200" y1="120" x2="269.3" y2="160" stroke="#C75B2A" stroke-width="1" opacity="0.2"/>
  <line x1="269.3" y1="160" x2="269.3" y2="240" stroke="#C75B2A" stroke-width="1" opacity="0.2"/>
  <line x1="269.3" y1="240" x2="200" y2="280" stroke="#C75B2A" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="280" x2="130.7" y2="240" stroke="#C75B2A" stroke-width="1" opacity="0.2"/>
  <line x1="130.7" y1="240" x2="130.7" y2="160" stroke="#C75B2A" stroke-width="1" opacity="0.2"/>
  <line x1="130.7" y1="160" x2="200" y2="120" stroke="#C75B2A" stroke-width="1" opacity="0.2"/>

  <!-- Diagonal cross lines -->
  <line x1="200" y1="120" x2="200" y2="280" stroke="#C75B2A" stroke-width="0.8" opacity="0.15"/>
  <line x1="130.7" y1="160" x2="269.3" y2="240" stroke="#C75B2A" stroke-width="0.8" opacity="0.15"/>
  <line x1="269.3" y1="160" x2="130.7" y2="240" stroke="#C75B2A" stroke-width="0.8" opacity="0.15"/>

  <!-- Star lines -->
  <line x1="200" y1="120" x2="269.3" y2="240" stroke="#C75B2A" stroke-width="0.8" opacity="0.12"/>
  <line x1="200" y1="120" x2="130.7" y2="240" stroke="#C75B2A" stroke-width="0.8" opacity="0.12"/>
  <line x1="269.3" y1="160" x2="200" y2="280" stroke="#C75B2A" stroke-width="0.8" opacity="0.12"/>
  <line x1="269.3" y1="160" x2="130.7" y2="240" stroke="#C75B2A" stroke-width="0.8" opacity="0.12"/>
  <line x1="130.7" y1="160" x2="200" y2="280" stroke="#C75B2A" stroke-width="0.8" opacity="0.12"/>
  <line x1="130.7" y1="160" x2="269.3" y2="240" stroke="#C75B2A" stroke-width="0.8" opacity="0.12"/>

  <!-- 7 circles -->
  <circle cx="200" cy="200" r="55" stroke="#C75B2A" stroke-width="2.5" opacity="0.7"/>
  <circle cx="200" cy="120" r="55" stroke="#C75B2A" stroke-width="2" opacity="0.45"/>
  <circle cx="200" cy="280" r="55" stroke="#C75B2A" stroke-width="2" opacity="0.45"/>
  <circle cx="269.3" cy="160" r="55" stroke="#C75B2A" stroke-width="2" opacity="0.45"/>
  <circle cx="269.3" cy="240" r="55" stroke="#C75B2A" stroke-width="2" opacity="0.45"/>
  <circle cx="130.7" cy="160" r="55" stroke="#C75B2A" stroke-width="2" opacity="0.45"/>
  <circle cx="130.7" cy="240" r="55" stroke="#C75B2A" stroke-width="2" opacity="0.45"/>

  <!-- Center dot -->
  <circle cx="200" cy="200" r="4" fill="#C75B2A" opacity="0.6"/>
</svg>
