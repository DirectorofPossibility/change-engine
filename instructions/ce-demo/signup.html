<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign Up — Community Exchange</title>
<link rel="stylesheet" href="style.css">
</head>
<body style="background:var(--navy);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px">

<a href="index.html" style="font-family:var(--head);font-size:28px;color:white;text-decoration:none;margin-bottom:40px;letter-spacing:.04em">Community <span style="background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Exchange</span></a>

<div style="background:var(--white);border-radius:12px;padding:40px 44px;width:100%;max-width:440px;box-shadow:0 8px 40px rgba(0,0,0,.3)">

  <!-- TABS -->
  <div style="display:flex;gap:0;border-bottom:2px solid var(--rule);margin-bottom:28px">
    <button id="tab-signup" onclick="showTab('signup')" style="flex:1;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:10px;background:none;border:none;border-bottom:2px solid var(--coral);margin-bottom:-2px;cursor:pointer;color:var(--black)">Sign Up</button>
    <button id="tab-login" onclick="showTab('login')" style="flex:1;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:10px;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;color:var(--text3)">Sign In</button>
  </div>

  <!-- SIGN UP FORM -->
  <div id="form-signup">
    <div style="margin-bottom:16px">
      <label style="display:block;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Full name</label>
      <input type="text" placeholder="Your name" style="width:100%;border:1px solid var(--rule);border-radius:6px;padding:11px 14px;font-family:var(--font);font-size:14px;color:var(--black);background:var(--bg);outline:none">
    </div>
    <div style="margin-bottom:16px">
      <label style="display:block;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Email</label>
      <input type="email" placeholder="you@example.com" style="width:100%;border:1px solid var(--rule);border-radius:6px;padding:11px 14px;font-family:var(--font);font-size:14px;color:var(--black);background:var(--bg);outline:none">
    </div>
    <div style="margin-bottom:24px">
      <label style="display:block;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Password</label>
      <input type="password" placeholder="Choose a password" style="width:100%;border:1px solid var(--rule);border-radius:6px;padding:11px 14px;font-family:var(--font);font-size:14px;color:var(--black);background:var(--bg);outline:none">
    </div>
    <button onclick="window.location='explore.html'" style="width:100%;background:var(--coral);border:none;color:white;border-radius:6px;padding:14px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;cursor:pointer">Create Account →</button>
    <p style="font-size:11px;color:var(--text3);text-align:center;margin-top:16px;line-height:1.6;font-weight:300">By signing up, you agree to our <a href="#" style="color:var(--teal)">terms</a> and <a href="#" style="color:var(--teal)">privacy policy</a>. Your account starts as a Neighbor — free, no credit card.</p>
  </div>

  <!-- SIGN IN FORM -->
  <div id="form-login" style="display:none">
    <div style="margin-bottom:16px">
      <label style="display:block;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Email</label>
      <input type="email" placeholder="you@example.com" style="width:100%;border:1px solid var(--rule);border-radius:6px;padding:11px 14px;font-family:var(--font);font-size:14px;color:var(--black);background:var(--bg);outline:none">
    </div>
    <div style="margin-bottom:24px">
      <label style="display:block;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Password</label>
      <input type="password" placeholder="Your password" style="width:100%;border:1px solid var(--rule);border-radius:6px;padding:11px 14px;font-family:var(--font);font-size:14px;color:var(--black);background:var(--bg);outline:none">
    </div>
    <button onclick="window.location='explore.html'" style="width:100%;background:var(--navy);border:none;color:white;border-radius:6px;padding:14px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;cursor:pointer">Sign In →</button>
    <p style="text-align:center;margin-top:16px"><a href="#" style="font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.07em;text-decoration:none">Forgot password?</a></p>
  </div>

</div>

<a href="index.html" style="font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:rgba(255,255,255,.3);text-decoration:none;margin-top:24px">← Back to Community Exchange</a>

<script>
function showTab(tab) {
  document.getElementById('form-signup').style.display = tab==='signup' ? 'block' : 'none';
  document.getElementById('form-login').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('tab-signup').style.color = tab==='signup' ? 'var(--black)' : 'var(--text3)';
  document.getElementById('tab-signup').style.borderBottomColor = tab==='signup' ? 'var(--coral)' : 'transparent';
  document.getElementById('tab-login').style.color = tab==='login' ? 'var(--black)' : 'var(--text3)';
  document.getElementById('tab-login').style.borderBottomColor = tab==='login' ? 'var(--coral)' : 'transparent';
}
</script>
</body>
</html>
